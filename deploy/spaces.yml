        - LITESTREAM_ACCESS_KEY_ID
        - LITESTREAM_SECRET_ACCESS_KEY
        - LITESTREAM_BUCKET
    environments:
      preview:
        branch_pattern: "preview/*"
      production:
        branch_pattern: main

