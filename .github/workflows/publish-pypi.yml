# Upload to PyPI when a version tag is pushed (e.g. v0.1.0).
# Configure Trusted Publishing at https://pypi.org/manage/account/publishing/
# for this repository before the first release.

name: Publish package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} expects pyproject version ${TAG}, got ${VER}"
            exit 1
          fi
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
